<!DOCTYPE html>
<html lang="en">
<head>
  <title>XiaoHui</title>
  <link rel="icon" type="image/ico" href="images/bopi.ico">
  <link rel="shortcut icon" href="images/bopi.ico" type="image/ico">

  <style>
    body{
      background-image: url('images/fishbone.png'); 
      background-repeat: repeat; 
      background-size: 180px; 
      background-attachment: fixed; 
    }
    :root {
      --paw-color: #ffb7c5;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f7e9a0;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .content-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 { margin-bottom: 0; color: #333; font-size: 2.5em; }
    h2 { margin-top: 5px; color: #777; font-weight: normal; margin-bottom: 40px; }

    .paw-container {
      display: flex;
      flex-direction: column;
      align-items: center; 
      width: fit-content;  
    }

    .paw-part {
      position: relative;
      background-color: var(--paw-color);
      border: 6px solid white; 
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
      cursor: pointer;
      overflow: hidden;
    }

    .paw-part::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .paw-part:hover::after {
      opacity: 1;
    }

    .paw-part:hover {
      transform: scale(1.08); 
      z-index: 10;
    }

    .main-pad {
      width: 320px;
      height: 260px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      margin-top: -45px; 
    }

    .toes-row {
      display: flex;
      justify-content: center;
      gap: 20px; 
      width: 100%;
    }

    .toe {
      width: 100px;
      height: 130px;
      border-radius: 50%;
    }
    
    .toe:nth-child(1) { transform: rotate(-15deg); margin-top: 100px; }
    .toe:nth-child(1):hover { transform: rotate(-15deg) scale(1.08); }
    .toe:nth-child(1)::after { background-image: url('images/young.jpg'); }

    .toe:nth-child(2) { width: 110px; height: 150px; margin-top: 0px; }
    .toe:nth-child(2)::after { background-image: url('images/goodcat1.jpg'); }

    .toe:nth-child(3) { width: 110px; height: 150px; margin-top: 0px; }
    .toe:nth-child(3)::after { background-image: url('images/curiouscat.jpg'); }

    .toe:nth-child(4) { transform: rotate(15deg); margin-top: 100px; }
    .toe:nth-child(4):hover { transform: rotate(15deg) scale(1.08); }
    .toe:nth-child(4)::after { background-image: url('images/kittycat.jpg'); }

    .main-pad::after { background-image: url('images/cat1.jpg'); }

#catModal {
  display: none;
  position: fixed;
  z-index: 2000;
  left: 0; top: 0;
  width: 100%; height: 100%;
  background-color: rgba(0,0,0,0.5);
}

#modalContent {
  position: relative;       
  background-color: #F7C85C;
  width: 300px;            
  height: 500px;
  margin: 15vh auto;         
  border-radius: 15px;       
  overflow: hidden;

  display: flex;
  flex-direction: column;
  justify-content: center; 
  align-items: center;    
}

#blackBox {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;             
  height: 90px;
  background-color: black;
  z-index: 10;
}

#closeBtn {
  position: absolute;
  top: 10px;   
  right: 15px;  
  font-size: 30px;
  z-index: 25;
  color: #F7C85C; 
  cursor: pointer;
  transition: all 0.3s ease; 
  display: inline-block; 
  line-height: 1; 
}

#closeBtn:hover {
  color: #ffb7c5; 
  transform: scale(1.5); 
}

#warningStripe {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 90px; 
  background: repeating-linear-gradient(
    -45deg,
    #000,       
    #000 30px,  
    #F7C85C 30px, 
    #F7C85C 40px 
  );
}
button{
  position: absolute;
  bottom: 0;
  right: 0;
}

/* This covers the whole screen during the 'error' */
#errorOverlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-color: red;
  z-index: 3000; /* Higher than everything! */
  opacity: 0.5;
}

@keyframes shake {
  0% { transform: translate(1px, 1px) rotate(0deg); }
  10% { transform: translate(-1px, -2px) rotate(-1deg); }
  30% { transform: translate(3px, 2px) rotate(0deg); }
  50% { transform: translate(-1px, 2px) rotate(1deg); }
  100% { transform: translate(1px, -2px) rotate(-1deg); }
}

.glitch-active {
  animation: shake 0.1s infinite;
}

  </style>
</head>

<body>

  <div class="content-wrapper">
    <h1>XiaoHui</h1>
    <h2>Under renovation...</h2>

    <div class="paw-container">
      <div class="toes-row">
        <div class="paw-part toe"></div>
        <div class="paw-part toe"></div>
        <div class="paw-part toe"></div>
        <div class="paw-part toe"></div>
      </div>
      <div class="paw-part main-pad"></div>
    </div>
  </div>

  <div id="catModal">
  <div id="modalContent">
    <div id="blackBox">
      <span id="closeBtn" onclick="closeModal()">&times;</span>
      <h2 style="color: #F7C85C; font-family: fantasy; font-size: 50px; text-align: center; line-height: 90px; margin: 0;">
        <b>DANGER</b>
      </h2>
    </div>
    <h4 style="color: black; font-family: fantasy; font-size: 25px; text-align: center; line-height: 50px; margin-top: 20px;">
      BEWARE OF THE FAT CAT
    </h4>
    <img src="images/bopilogo.png" alt="XiaoHui" style="width: 290px; height: auto; margin-bottom: 40px; z-index: 2;">
    <div id="warningStripe" style="position: absolute; bottom: 0;"></div>
  </div>
</div>

<button type="button" onclick="openModal()">H</button>
<div id="errorOverlay"></div>

<script>
// Function for a quick error
function openModal() {
    runErrorEffect(500); 
}

// Automatic start with a LONGER error
window.onload = function() {
    runErrorEffect(2000); 
};

function runErrorEffect(duration) {
    const error = document.getElementById("errorOverlay");
    const modal = document.getElementById("catModal");

    error.style.display = "block";
    document.body.classList.add("glitch-active");

    setTimeout(function() {
        error.style.display = "none";
        document.body.classList.remove("glitch-active");
        modal.style.display(3) = "block";
    }, duration);
}

function closeModal() {
    document.getElementById("catModal").style.display = "none";
}
</script>
</body>
</html>
