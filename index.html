<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XiaoHui</title>
  <link rel="icon" type="image/ico" href="images/iconcat.ico">
  <link rel="shortcut icon" href="images/iconcat.ico" type="image/ico">

  <style>
    :root {
      --paw-color: #ffb7c5;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f0f0f0;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .content-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 { margin-bottom: 0; color: #333; font-size: 2.5em; }
    h2 { margin-top: 5px; color: #777; font-weight: normal; margin-bottom: 40px; }

    .paw-container {
      display: flex;
      flex-direction: column;
      align-items: center; 
      width: fit-content;  
    }

    .paw-part {
      position: relative;
      background-color: var(--paw-color);
      border: 6px solid white; 
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
      cursor: pointer;
      overflow: hidden;
    }

    .paw-part::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .paw-part:hover::after {
      opacity: 1;
    }

    .paw-part:hover {
      transform: scale(1.08); 
      z-index: 10;
    }

    .main-pad {
      width: 320px;
      height: 260px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      margin-top: -45px; 
    }

    .toes-row {
      display: flex;
      justify-content: center;
      gap: 20px; 
      width: 100%;
    }

    .toe {
      width: 100px;
      height: 130px;
      border-radius: 50%;
    }
    
    .toe:nth-child(1) { transform: rotate(-15deg); margin-top: 100px; }
    .toe:nth-child(1):hover { transform: rotate(-15deg) scale(1.08); }
    .toe:nth-child(1)::after { background-image: url('images/young.jpg'); }

    .toe:nth-child(2) { width: 110px; height: 150px; margin-top: 0px; }
    .toe:nth-child(2)::after { background-image: url('images/goodcat1.jpg'); }

    .toe:nth-child(3) { width: 110px; height: 150px; margin-top: 0px; }
    .toe:nth-child(3)::after { background-image: url('images/curiouscat.jpg'); }

    .toe:nth-child(4) { transform: rotate(15deg); margin-top: 100px; }
    .toe:nth-child(4):hover { transform: rotate(15deg) scale(1.08); }
    .toe:nth-child(4)::after { background-image: url('images/kittycat.jpg'); }

    .main-pad::after { background-image: url('images/cat1.jpg'); }

  </style>
</head>

<body>

  <div class="content-wrapper">
    <h1>XiaoHui</h1>
    <h2>Under renovation...</h2>

    <div class="paw-container">
      <div class="toes-row">
        <div class="paw-part toe"></div>
        <div class="paw-part toe"></div>
        <div class="paw-part toe"></div>
        <div class="paw-part toe"></div>
      </div>

      <div class="paw-part main-pad"></div>
    </div>
  </div>

</body>
</html>
