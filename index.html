<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XiaoHui</title>


  <link rel="icon" type="image/ico" href="images/iconcat.ico">

  <link rel="shortcut icon" href="images/iconcat.ico" type="image/ico">
</head>

<body>
  <h1>XiaoHui</h1>
  <h2>Under renovation...</h2>

 <style>
        :root {
            --paw-color: #ffb7c5;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
            font-family: sans-serif;
        }

        /* The Container for the whole paw */
        .paw-container {
          display: flex;
          flex-direction: column;
          align-items: center; 
          width: fit-content;  
          margin: 0 auto;      
        }
   
        /* Common style for all paw parts */
        .paw-part {
            background-size: cover;
            background-position: center;
            background-color: var(--paw-color);
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .paw-part:hover {
            transform: scale(1.1);
            z-index: 10;
        }

        /* The main large pad (Bottom) */
        .main-pad {
            width: 220px;
            height: 180px;
            border-radius: 50% 50% 40% 40%;
            margin-top: 10px;
        }

        /* The row for the four toes */
        .toes-row {
          display: flex;
          justify-content: center; /* Spaces toes evenly from the center */
          gap: 15px;
          width: 100%;
        }

        /* Individual toes */
        .toe {
            width: 80px;
            height: 100px;
            border-radius: 50%;
        }

        /* Adjusting toe heights for a natural look */
        .toe:nth-child(1), .toe:nth-child(4) { margin-top: 40px; }
        .toe:nth-child(2), .toe:nth-child(3) { margin-top: 0px; }

    </style>


  <div class="paw-container">
        <div class="toes-row">
            <div class="paw-part toe" style="background-image: url('young.jpg');"></div>
            <div class="paw-part toe" style="background-image: url('goodcat1.jpg');"></div>
            <div class="paw-part toe" style="background-image: url('curiouscat.jpg');"></div>
            <div class="paw-part toe" style="background-image: url('cat1.jpg');"></div>
        </div>

        <div class="paw-part main-pad" style="background-image: url('kittycat.jpg');"></div>
    </div>
</body>
</html>
