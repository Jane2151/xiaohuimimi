<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XiaoHui</title>
  <link rel="icon" type="image/ico" href="images/iconcat.ico">
  <link rel="shortcut icon" href="images/iconcat.ico" type="image/ico">

  <style>
    :root {
      --paw-color: #ffb7c5;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f0f0f0;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .content-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 { margin-bottom: 0; color: #333; }
    h2 { margin-top: 5px; color: #777; font-weight: normal; margin-bottom: 30px; }

    .paw-container {
      display: flex;
      flex-direction: column;
      align-items: center; 
      width: fit-content;  
    }

    .paw-part {
      background-size: cover;
      background-position: center;
      background-color: var(--paw-color);
      transition: transform 0.3s ease;
      cursor: pointer;
    }

    /* We use the custom SVG math here */
    .main-pad {
      width: 800px;  /* Wide enough for your coordinates */
      height: 600px;
      border: 4px solid white;
      clip-path: url(#myCustomPaw);
      margin-top: -150px; /* Adjusting position because path starts high up */
    }

    .paw-part:hover {
      transform: scale(1.1);
      z-index: 10;
    }

    .toes-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      width: 100%;
    }

    .toe {
      width: 65px;
      height: 85px;
      border-radius: 50%;
      border: 4px solid white; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .toe:nth-child(1), .toe:nth-child(4) { margin-top: 30px; }
    .toe:nth-child(2), .toe:nth-child(3) { margin-top: 0px; }
  </style>
</head>

<body>

  <div class="content-wrapper">
    <h1>XiaoHui</h1>
    <h2>Under renovation...</h2>

    <div class="paw-container">
      <div class="toes-row">
        <div class="paw-part toe" style="background-image: url('young.jpg');"></div>
        <div class="paw-part toe" style="background-image: url('goodcat1.jpg');"></div>
        <div class="paw-part toe" style="background-image: url('curiouscat.jpg');"></div>
        <div class="paw-part toe" style="background-image: url('cat1.jpg');"></div>
      </div>

      <div class="paw-part main-pad" style="background-image: url('kittycat.jpg');"></div>
    </div>
  </div>

  <svg width="0" height="0" style="position: absolute;">
    <defs>
      <clipPath id="myCustomPaw" clipPathUnits="userSpaceOnUse">
        <path d="M 600 550 Q 500 550 400 450 Q 250 550 200 550 Q 50 550 50 400 Q 100 300 150 250 Q 250 150 350 50 Q 400 0 450 50 Q 550 150 650 250 Q 700 300 750 400 Q 750 550 600 550 " />
      </clipPath>
    </defs>
  </svg>

</body>
</html>
