<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XiaoHui</title>
  <link rel="icon" type="image/ico" href="images/iconcat.ico">
  <link rel="shortcut icon" href="images/iconcat.ico" type="image/ico">

  <style>
    :root {
      --paw-color: #ffb7c5;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f0f0f0;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* This wrapper forces the H1, H2, and Paw into a vertical column */
    .content-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 { margin-bottom: 0; color: #333; }
    h2 { margin-top: 5px; color: #777; font-weight: normal; margin-bottom: 30px; }

    /* The Container for the whole paw */
    .paw-container {
      display: flex;
      flex-direction: column;
      align-items: center; 
      width: fit-content;  
    }

    .paw-part {
      background-size: cover;
      background-position: center;
      background-color: var(--paw-color);
      border: 4px solid white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
      cursor: pointer;
    }

    .paw-part:hover {
      transform: scale(1.1);
      z-index: 10;
    }

    .main-pad {
      width: 200px;
      height: 160px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      margin-top: 8px;
    }

    .toes-row {
      display: flex;
      justify-content: center;
      gap: 5px;
      width: 100%;
    }

    /* Resized toes (Slightly smaller) */
    .toe {
      width: 65px;
      height: 85px;
      border-radius: 50%;
    }
    
    .toe:nth-child(1) { transform: rotate(-15deg); margin-top: 60px; }
    .toe:nth-child(2) { height: 100px; margin-top: 5px; }
    .toe:nth-child(3) { height: 100px; margin-top: 5px; }
    .toe:nth-child(4) { transform: rotate(15deg); margin-top: 60px; }
  </style>
</head>

<body>

  <div class="content-wrapper">
    <h1>XiaoHui</h1>
    <h2>Under renovation...</h2>

    <div class="paw-container">
      <div class="toes-row">
        <div class="paw-part toe" style="background-image: url('young.jpg');"></div>
        <div class="paw-part toe" style="background-image: url('goodcat1.jpg');"></div>
        <div class="paw-part toe" style="background-image: url('curiouscat.jpg');"></div>
        <div class="paw-part toe" style="background-image: url('cat1.jpg');"></div>
      </div>

      <div class="paw-part main-pad" style="background-image: url('kittycat.jpg');"></div>
    </div>
  </div>

</body>
</html>
